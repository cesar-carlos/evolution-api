<!DOCTYPE html>
<html>
<head>
    <title>Teste de QR Code API</title>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 5px;
        }
        button {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        pre {
            background-color: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .error {
            color: red;
        }
        .success {
            color: green;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Teste de API Key</h1>
        
        <div>
            <button id="checkApiKey">Verificar API Key</button>
            <button id="clearResults">Limpar Resultados</button>
        </div>
        
        <h2>Resultados:</h2>
        <div id="results"></div>
    </div>

    <script>
        document.getElementById('checkApiKey').addEventListener('click', async () => {
            const resultsContainer = document.getElementById('results');
            
            try {
                // Adicionando timestamp para evitar cache
                const timestamp = new Date().getTime();
                
                // Passo 1: Verificar se a API key está configurada
                resultsContainer.innerHTML += `<p>Passo 1: Verificando se a API key está configurada...</p>`;
                const apiKeyCheckResponse = await fetch(`http://localhost:8080/qrcode/api-key?t=${timestamp}`, {
                    method: 'GET',
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                        'Expires': '0'
                    }
                });
                
                if (!apiKeyCheckResponse.ok) {
                    throw new Error(`Erro ao verificar API key: ${apiKeyCheckResponse.status} ${apiKeyCheckResponse.statusText}`);
                }
                
                const apiKeyData = await apiKeyCheckResponse.json();
                resultsContainer.innerHTML += `<pre>${JSON.stringify(apiKeyData, null, 2)}</pre>`;
                
                if (!apiKeyData.configured) {
                    resultsContainer.innerHTML += `<p class="error">API Key não está configurada no servidor!</p>`;
                    return;
                }
                
                // Passo 2: Trocar o token de sessão pela chave API
                resultsContainer.innerHTML += `<p>Passo 2: Trocando o token de sessão pela chave API...</p>`;
                const tokenExchangeResponse = await fetch(`http://localhost:8080/qrcode/exchange-token?t=${timestamp}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                        'Expires': '0'
                    },
                    body: JSON.stringify({ sessionToken: apiKeyData.sessionToken })
                });
                
                if (!tokenExchangeResponse.ok) {
                    throw new Error(`Erro ao trocar token: ${tokenExchangeResponse.status} ${tokenExchangeResponse.statusText}`);
                }
                
                const tokenData = await tokenExchangeResponse.json();
                // Não mostrar a chave completa por segurança
                const maskedApiKey = tokenData.apiKey.substring(0, 4) + '****' + tokenData.apiKey.substring(tokenData.apiKey.length - 4);
                resultsContainer.innerHTML += `<p class="success">Sucesso! API Key obtida: ${maskedApiKey}</p>`;
                
            } catch (error) {
                resultsContainer.innerHTML += `<p class="error">Erro: ${error.message}</p>`;
                console.error(error);
            }
        });
        
        document.getElementById('clearResults').addEventListener('click', () => {
            document.getElementById('results').innerHTML = '';
        });
    </script>
</body>
</html>
